<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulScan – Feeds</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #status { white-space: pre-wrap; }
    .feed-card { height: 100%; }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard.html">VulScan</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topnav"
            aria-controls="topnav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="topnav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/assets.html">Assets</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin-users.html">Access</a></li>
        <li class="nav-item"><a class="nav-link active" href="/feeds.html">Feeds</a></li>
        <li class="nav-item"><a class="nav-link" href="/api.html">API documentation</a></li>
      </ul>
      <span id="currentUser" class="text-light small me-3"></span>
      <button id="btnLogout" class="btn btn-sm btn-outline-light" type="button">Logout</button>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="d-flex align-items-center mb-3">
    <h4 class="mb-0">Public feeds</h4>
    <button id="btnRefreshEnabled" class="btn btn-sm btn-primary ms-auto me-2">Refresh all</button>
    <button id="btnReload" class="btn btn-sm btn-outline-primary">Reload</button>
  </div>
  <div id="status" class="small text-muted mb-3"></div>
  <div id="feedsGrid" class="row g-3"></div>
</div>

<script>
  const currentUserEl = document.getElementById('currentUser');
  let latestFeeds = [];
  let latestJobs = [];
  let jobsByType = {};
  let pollIntervalId = null;
  let lastSummaryStatus = '';

  function accessToken() { return localStorage.getItem('accessToken'); }
  function refreshToken() { return localStorage.getItem('refreshToken'); }
  function logout() {
    localStorage.removeItem('accessToken');
    localStorage.removeItem('refreshToken');
    window.location.replace('/');
  }

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function setStatus(msg, danger = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = danger ? 'small text-danger mb-3' : 'small text-muted mb-3';
  }

  function fmtDate(iso) {
    if (!iso) return 'never';
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return String(iso);
    const p2 = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}`;
  }

  function isRunningJob(job) {
    if (!job) return false;
    return job.status === 'RUNNING' || job.status === 'QUEUED';
  }

  function isQueuedJob(job) {
    if (!job) return false;
    return job.status === 'QUEUED';
  }

  function jobSummary(job) {
    if (!job) return '';
    const tail = [];
    if (job.itemsRead !== null && job.itemsRead !== undefined) tail.push(`read=${job.itemsRead}`);
    if (job.upserted !== null && job.upserted !== undefined) tail.push(`upserted=${job.upserted}`);
    const details = tail.length ? ` (${tail.join(', ')})` : '';
    return `${job.status}${details}${job.message ? ` - ${job.message}` : ''}`;
  }

  function rebuildJobsIndex() {
    jobsByType = {};
    for (const job of latestJobs) {
      if (!jobsByType[job.type]) {
        jobsByType[job.type] = job;
      }
      if (isRunningJob(job)) {
        jobsByType[job.type] = job;
      }
    }
  }

  async function tryRefreshToken() {
    const rt = refreshToken();
    if (!rt) return false;
    const res = await fetch('/api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: rt })
    });
    if (!res.ok) return false;
    const data = await res.json();
    if (!data || !data.accessToken) return false;
    localStorage.setItem('accessToken', data.accessToken);
    if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
    return true;
  }

  async function apiFetch(url, options = {}, allowRetry = true) {
    const token = accessToken();
    const headers = Object.assign({}, options.headers || {});
    if (token) headers.Authorization = 'Bearer ' + token;

    let res = await fetch(url, Object.assign({}, options, { headers }));
    if ((res.status === 401 || res.status === 403) && allowRetry) {
      const refreshed = await tryRefreshToken();
      if (refreshed) {
        const retryHeaders = Object.assign({}, options.headers || {}, { Authorization: 'Bearer ' + accessToken() });
        res = await fetch(url, Object.assign({}, options, { headers: retryHeaders }));
      }
    }
    if (res.status === 401) {
      logout();
      throw new Error('Unauthorized');
    }
    if (res.status === 403) {
      throw new Error('Access denied');
    }
    return res;
  }

  async function loadCurrentUser() {
    try {
      const meRes = await apiFetch('/api/users/me');
      const me = await meRes.json();
      const roles = (me.roles || []).map(r => String(r).toUpperCase().replace(/^ROLE_/, '')).join(', ');
      currentUserEl.textContent = `${me.email || 'unknown'} (${roles || 'n/a'})`;
      return me;
    } catch {
      currentUserEl.textContent = '';
      return null;
    }
  }

  async function verifyAdmin() {
    const me = await loadCurrentUser();
    if (!me) return false;
    const roles = (me.roles || []).map(r => String(r).toUpperCase().replace(/^ROLE_/, ''));
    const isAdmin = roles.includes('ADMIN') || roles.includes('SUPERADMIN');
    if (!isAdmin) {
      window.location.replace('/dashboard.html');
      return false;
    }
    return true;
  }

  function feedCardHtml(feed) {
    const type = feed.type;
    const job = jobsByType[type] || null;
    const running = isRunningJob(job);
    const queued = isQueuedJob(job);
    const statusBadge =
      queued ? '<span class="badge text-bg-secondary">QUEUED</span>' :
      running ? '<span class="badge text-bg-info">RUNNING</span>' :
      feed.lastStatus === 'OK' ? '<span class="badge text-bg-success">OK</span>' :
      feed.lastStatus === 'CANCELLED' ? '<span class="badge text-bg-warning">CANCELLED</span>' :
      feed.lastStatus === 'ERROR' ? '<span class="badge text-bg-danger">ERROR</span>' :
      feed.lastStatus === 'SKIPPED' ? '<span class="badge text-bg-warning">SKIPPED</span>' :
      '<span class="badge text-bg-secondary">' + esc(feed.lastStatus || 'NEVER') + '</span>';

    const runInfo = job
      ? `<div class="small ${running ? 'text-primary' : 'text-muted'} mb-2">Background job: ${esc(jobSummary(job))}<br>Started: ${esc(fmtDate(job.startedAt))}${job.finishedAt ? ` | Finished: ${esc(fmtDate(job.finishedAt))}` : ''}</div>`
      : '';

    const stopButton = running
      ? `<button class="btn btn-sm btn-outline-danger" onclick="stopFeedRefresh('${type}')">Stop</button>`
      : '';

    return `
      <div class="col-12 col-lg-6">
        <div class="card shadow-sm feed-card">
          <div class="card-body">
            <div class="d-flex align-items-center mb-2">
              <h5 class="card-title mb-0">${esc(type)}</h5>
              <div class="ms-auto">${statusBadge}</div>
            </div>
            <div class="small text-muted mb-2">Last refresh: ${esc(fmtDate(feed.lastRefreshedAt))}</div>
            <div class="small text-muted mb-3">${esc(feed.lastMessage || '')}</div>
            ${runInfo}

            <label class="form-label small text-muted">Feed URL</label>
            <input id="url-${type}" class="form-control form-control-sm" type="text" value="${esc(feed.feedUrl || '')}">

            <div class="mt-3 d-flex gap-2">
              <button class="btn btn-sm btn-outline-primary" onclick="saveFeed('${type}')">Save</button>
              ${stopButton}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderFeeds() {
    document.getElementById('feedsGrid').innerHTML = latestFeeds.map(feedCardHtml).join('');
  }

  async function loadJobs(silent = false) {
    try {
      const res = await apiFetch('/api/feeds/jobs');
      const txt = await res.text();
      if (!res.ok) throw new Error(txt);
      latestJobs = JSON.parse(txt || '[]');
      rebuildJobsIndex();
      if (!silent) {
        const runningCount = latestJobs.filter(isRunningJob).length;
        if (runningCount > 0) {
          setStatus(`${runningCount} background refresh job fut.`);
        }
      }
    } catch (e) {
      if (!silent) {
        setStatus('Job list failed: ' + e.message, true);
      }
    }
  }

  async function loadFeeds(silent = false) {
    if (!silent) {
      setStatus('Loading feed settings...');
    }
    try {
      const res = await apiFetch('/api/feeds');
      const txt = await res.text();
      if (!res.ok) throw new Error(txt);
      latestFeeds = JSON.parse(txt || '[]');
      renderFeeds();
      if (!silent) {
        setStatus(`Loaded ${latestFeeds.length} feed(s).`);
      }
    } catch (e) {
      setStatus('Feed list failed: ' + e.message, true);
    }
  }

  async function reloadAll(silent = false) {
    await loadJobs(true);
    await loadFeeds(true);

    const runningCount = latestJobs.filter(isRunningJob).length;
    const queuedCount = latestJobs.filter(isQueuedJob).length;
    const activeCount = runningCount - queuedCount;
    const summary = runningCount > 0
      ? `${latestFeeds.length} feed betöltve. Futó: ${activeCount}, sorban: ${queuedCount}.`
      : `${latestFeeds.length} feed betöltve.`;

    if (!silent || summary !== lastSummaryStatus) {
      setStatus(summary);
      lastSummaryStatus = summary;
    }
  }

  async function saveFeed(type) {
    const feedUrl = document.getElementById('url-' + type).value || '';

    setStatus(`Saving ${type} settings...`);
    try {
      const res = await apiFetch('/api/feeds/' + encodeURIComponent(type), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ feedUrl })
      });
      const txt = await res.text();
      if (!res.ok) throw new Error(txt);
      setStatus(`${type} settings saved.`);
      await reloadAll(true);
    } catch (e) {
      setStatus(`Save failed for ${type}: ` + e.message, true);
    }
  }

  async function stopFeedRefresh(type) {
    const job = jobsByType[type];
    if (!job || !isRunningJob(job)) {
      setStatus(`${type} feednél nincs futó háttér job.`);
      return;
    }

    setStatus(`${type} background refresh leállítása...`);
    try {
      const res = await apiFetch('/api/feeds/jobs/' + encodeURIComponent(job.jobId) + '/cancel', {
        method: 'POST'
      });
      const txt = await res.text();
      if (!res.ok) throw new Error(txt);
      setStatus(`${type} refresh leállítás kérés elküldve.`);
      await reloadAll(true);
    } catch (e) {
      setStatus(`Stop failed for ${type}: ` + e.message, true);
    }
  }

  async function refreshEnabledFeeds() {
    setStatus('Background refresh indítása minden feedre...');
    try {
      const res = await apiFetch('/api/feeds/refresh-enabled-async', {
        method: 'POST'
      });
      const txt = await res.text();
      if (!res.ok) throw new Error(txt);

      const payload = JSON.parse(txt);
      const summary = (payload || []).map(x => `${x.type}:${x.jobId}`).join(' | ');
      setStatus('Background refresh indítva. ' + (summary || 'No enabled feeds.'));
      await reloadAll(true);
    } catch (e) {
      setStatus('Refresh all failed: ' + e.message, true);
    }
  }

  function startPolling() {
    if (pollIntervalId) return;
    pollIntervalId = setInterval(async () => {
      await reloadAll(true);
    }, 2000);
  }

  function stopPolling() {
    if (!pollIntervalId) return;
    clearInterval(pollIntervalId);
    pollIntervalId = null;
  }

  window.saveFeed = saveFeed;
  window.stopFeedRefresh = stopFeedRefresh;
  window.refreshEnabledFeeds = refreshEnabledFeeds;

  document.getElementById('btnReload').addEventListener('click', reloadAll);
  document.getElementById('btnRefreshEnabled').addEventListener('click', refreshEnabledFeeds);
  document.getElementById('btnLogout').addEventListener('click', logout);

  (async function init() {
    if (!accessToken()) {
      const refreshed = await tryRefreshToken();
      if (!refreshed) {
        logout();
        return;
      }
    }

    const ok = await verifyAdmin();
    if (!ok) return;
    await reloadAll();
    startPolling();
  })();

  window.addEventListener('beforeunload', stopPolling);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
