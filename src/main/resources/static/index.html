<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulScan – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-3">VulScan Login</h4>
          <form id="loginForm" class="d-grid gap-3">
            <div>
              <label for="email" class="form-label">Email</label>
              <input id="email" type="email" class="form-control" required value="superadmin@vulscan.local" />
            </div>
            <div>
              <label for="password" class="form-label">Password</label>
              <input id="password" type="password" class="form-control" required value="SuperAdmin123!" />
            </div>
            <button id="btnLogin" type="submit" class="btn btn-primary">Login</button>
          </form>
          <div id="msg" class="small text-danger mt-3"></div>
          <div class="small text-muted mt-2">
            First startup creates Superadmin from app config.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btnLogin');

  if (localStorage.getItem('accessToken')) {
    window.location.replace('/dashboard.html');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.textContent = '';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });

      const text = await res.text();
      if (!res.ok) {
        throw new Error(text || 'Login failed');
      }

      const data = JSON.parse(text);
      localStorage.setItem('accessToken', data.accessToken || '');
      localStorage.setItem('refreshToken', data.refreshToken || '');
      window.location.replace('/dashboard.html');
    } catch (err) {
      msg.textContent = 'Login error: ' + (err.message || 'unknown error');
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
