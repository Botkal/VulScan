<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulScan – Access</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .top-card { height: 100%; }
    #listMsg { white-space: pre-wrap; }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard.html">VulScan</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topnav"
            aria-controls="topnav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="topnav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="/dashboard.html">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/assets.html">Assets</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/admin-users.html">Access</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/feeds.html">Feeds</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/api.html">API documentation</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span id="currentUser" class="text-light small"></span>
        <button id="btnLogout" class="btn btn-sm btn-outline-light" type="button">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="row g-3 align-items-stretch">
    <div class="col-12 col-lg-6">
      <div class="card shadow-sm top-card h-100">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Create user</h5>
          <form id="createForm" class="d-grid gap-2 mt-2">
            <input id="email" class="form-control" type="email" placeholder="Email" required />
            <input id="password" class="form-control" type="password" placeholder="Password" required />
            <select id="status" class="form-select">
              <option value="ACTIVE">ACTIVE</option>
              <option value="DISABLED">DISABLED</option>
            </select>
            <select id="accessLevel" class="form-select">
              <option value="SUPERADMIN">SUPERADMIN</option>
              <option value="ADMIN">ADMIN</option>
              <option value="USER" selected>USER</option>
            </select>
            <button class="btn btn-primary" type="submit">Create</button>
          </form>
          <div id="createMsg" class="small mt-2"></div>
          <div class="mt-auto"></div>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-6">
      <div class="card shadow-sm top-card h-100">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Access levels</h5>
          <div class="small text-muted mt-2">
            Use dropdowns to manage access levels: SUPERADMIN, ADMIN, USER.
          </div>
          <div class="small text-muted mt-1">
            Status can be ACTIVE or DISABLED.
          </div>
          <div class="mt-3">
            <button id="btnReload" class="btn btn-sm btn-outline-primary">Reload users</button>
          </div>
          <div class="mt-auto"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm mt-3">
    <div class="card-body">
      <h5 class="card-title mb-2">Users</h5>
      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Status</th>
            <th>Access</th>
            <th>Update status</th>
            <th>Update access</th>
          </tr>
          </thead>
          <tbody id="usersTbody"></tbody>
        </table>
      </div>
      <div id="listMsg" class="small text-muted"></div>
    </div>
  </div>
</div>

<script>
  const currentUserEl = document.getElementById('currentUser');
  const ACCESS_LEVELS = ['SUPERADMIN', 'ADMIN', 'USER'];

  function accessToken() { return localStorage.getItem('accessToken'); }
  function refreshToken() { return localStorage.getItem('refreshToken'); }
  function logout() {
    localStorage.removeItem('accessToken');
    localStorage.removeItem('refreshToken');
    window.location.replace('/');
  }

  function resolvePrimaryAccess(roles) {
    if (!roles || !Array.isArray(roles)) return 'USER';
    for (const level of ACCESS_LEVELS) {
      if (roles.includes(level)) return level;
    }
    return 'USER';
  }

  function levelOptions(selected) {
    return ACCESS_LEVELS
      .map(level => `<option value="${level}" ${selected === level ? 'selected' : ''}>${level}</option>`)
      .join('');
  }

  function accessBadge(level) {
    if (level === 'SUPERADMIN') return '<span class="badge text-bg-danger">SUPERADMIN</span>';
    if (level === 'ADMIN') return '<span class="badge text-bg-warning">ADMIN</span>';
    return '<span class="badge text-bg-secondary">USER</span>';
  }

  async function tryRefreshToken() {
    const rt = refreshToken();
    if (!rt) return false;
    const res = await fetch('/api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: rt })
    });
    if (!res.ok) return false;
    const data = await res.json();
    if (!data || !data.accessToken) return false;
    localStorage.setItem('accessToken', data.accessToken);
    if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
    return true;
  }

  async function apiFetch(url, options = {}, allowRetry = true) {
    const token = accessToken();
    const headers = Object.assign({}, options.headers || {});
    if (token) headers.Authorization = 'Bearer ' + token;

    let res = await fetch(url, Object.assign({}, options, { headers }));
    if ((res.status === 401 || res.status === 403) && allowRetry) {
      const refreshed = await tryRefreshToken();
      if (refreshed) {
        const retryHeaders = Object.assign({}, options.headers || {}, { Authorization: 'Bearer ' + accessToken() });
        res = await fetch(url, Object.assign({}, options, { headers: retryHeaders }));
      }
    }
    if (res.status === 401) {
      logout();
      throw new Error('Unauthorized');
    }
    if (res.status === 403) {
      throw new Error('Access denied');
    }
    return res;
  }

  async function loadCurrentUser() {
    try {
      const meRes = await apiFetch('/api/users/me');
      const me = await meRes.json();
      const roles = (me.roles || []).map(r => String(r).toUpperCase().replace(/^ROLE_/, '')).join(', ');
      currentUserEl.textContent = `${me.email || 'unknown'} (${roles || 'n/a'})`;
      return me;
    } catch {
      currentUserEl.textContent = '';
      return null;
    }
  }

  function rowHtml(user) {
    const access = resolvePrimaryAccess(user.roles || []);
    return `
      <tr>
        <td>${user.id}</td>
        <td>${user.email}</td>
        <td><span class="badge ${user.status === 'ACTIVE' ? 'text-bg-success' : 'text-bg-secondary'}">${user.status}</span></td>
        <td>${accessBadge(access)}</td>
        <td>
          <select class="form-select form-select-sm" id="status-${user.id}">
            <option value="ACTIVE" ${user.status === 'ACTIVE' ? 'selected' : ''}>ACTIVE</option>
            <option value="DISABLED" ${user.status === 'DISABLED' ? 'selected' : ''}>DISABLED</option>
          </select>
          <button class="btn btn-sm btn-outline-primary mt-1" onclick="updateStatus(${user.id})">Save</button>
        </td>
        <td>
          <select class="form-select form-select-sm" id="access-${user.id}">
            ${levelOptions(access)}
          </select>
          <button class="btn btn-sm btn-outline-primary mt-1" onclick="updateAccess(${user.id})">Save</button>
        </td>
      </tr>
    `;
  }

  async function loadUsers() {
    const msg = document.getElementById('listMsg');
    const tbody = document.getElementById('usersTbody');
    msg.textContent = 'Loading users...';

    try {
      const me = await loadCurrentUser();
      if (!me) {
        msg.textContent = 'Load failed: no active user profile';
        msg.className = 'small text-danger';
        return;
      }
      const roles = (me.roles || []).map(r => String(r).toUpperCase().replace(/^ROLE_/, ''));
      const isAdmin = roles.includes('ADMIN') || roles.includes('SUPERADMIN');
      if (!isAdmin) {
        window.location.replace('/dashboard.html');
        return;
      }

      const res = await apiFetch('/api/admin/users');
      const users = await res.json();
      tbody.innerHTML = users.map(rowHtml).join('');
      msg.textContent = `Loaded ${users.length} users.`;
      msg.className = 'small text-muted';
    } catch (err) {
      msg.textContent = 'Load failed: ' + (err.message || 'unknown error');
      msg.className = 'small text-danger';
    }
  }

  async function updateStatus(userId) {
    const status = document.getElementById(`status-${userId}`).value;
    const msg = document.getElementById('listMsg');
    try {
      const res = await apiFetch(`/api/admin/users/${userId}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error(t || 'status update failed');
      }
      msg.textContent = 'Status updated.';
      msg.className = 'small text-success';
      await loadUsers();
    } catch (err) {
      msg.textContent = 'Status update failed: ' + (err.message || 'unknown error');
      msg.className = 'small text-danger';
    }
  }

  async function updateAccess(userId) {
    const level = document.getElementById(`access-${userId}`).value;
    const msg = document.getElementById('listMsg');
    try {
      const res = await apiFetch(`/api/admin/users/${userId}/roles`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roles: [level] })
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error(t || 'access update failed');
      }
      msg.textContent = 'Access updated.';
      msg.className = 'small text-success';
      await loadUsers();
    } catch (err) {
      msg.textContent = 'Access update failed: ' + (err.message || 'unknown error');
      msg.className = 'small text-danger';
    }
  }

  document.getElementById('createForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const createMsg = document.getElementById('createMsg');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const status = document.getElementById('status').value;
    const level = document.getElementById('accessLevel').value;

    try {
      const res = await apiFetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, status, roles: [level] })
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error(t || 'create failed');
      }
      createMsg.textContent = 'User created.';
      createMsg.className = 'small mt-2 text-success';
      e.target.reset();
      document.getElementById('status').value = 'ACTIVE';
      document.getElementById('accessLevel').value = 'USER';
      await loadUsers();
    } catch (err) {
      createMsg.textContent = 'Create failed: ' + (err.message || 'unknown error');
      createMsg.className = 'small mt-2 text-danger';
    }
  });

  document.getElementById('btnReload').addEventListener('click', loadUsers);
  document.getElementById('btnLogout').addEventListener('click', logout);
  window.updateStatus = updateStatus;
  window.updateAccess = updateAccess;

  (async function init() {
    if (!accessToken()) {
      const refreshed = await tryRefreshToken();
      if (!refreshed) {
        logout();
        return;
      }
    }
    await loadUsers();
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
